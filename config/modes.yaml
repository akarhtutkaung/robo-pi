# modes.yaml
# Mode-specific settings for each operating mode.
# Hardware config (pins, addresses, PWM) lives in hardware.yaml.

autonomous:
  speed: 6          # forward cruising speed
  reverse_speed: 4  # reverse speed during avoidance maneuvers
  approach_speed: 3 # speed when slowing down in the braking zone

  # execute_avoidance timing — tune alongside speed values
  turn_drive_s: 0.8          # forward duration for TURN_LEFT / TURN_RIGHT
  kturn_steer_settle_s: 0.3  # pause after each steer command in K-turn
  kturn_reverse_s: 1.5       # reverse duration in K-turn
  kturn_forward_s: 1.0       # forward duration in K-turn
  kturn_final_settle_s: 0.5  # settle pause before final smooth_stop
  reverse_fallback_s: 2.0    # max straight-reverse duration in free-space fallback; stops early when rear sensor fires
                              # distance estimate: reverse_speed × cm_per_speed_unit × t = 4 × 1.2 × 2.0 ≈ 9.6 cm
                              # increase if the robot is not escaping the blocked zone reliably

  # Clear-phase lateral sweep
  sweep_angle_deg: 20  # degrees either side of centre for background sweep
  warn_cm: 60          # slow to approach_speed if YOLO+ultrasonic confirm obstacle within this range
  yolo_block_ratio: 0.25  # min bounding-box width fraction to trigger YOLO-only avoidance for low obstacles
