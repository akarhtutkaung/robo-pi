# hardware.yaml
# Central config for all hardware pin assignments and I2C addresses.
# Load this in src/core/config.py and pass values down to hardware modules.
# Never hardcode pins in hardware files — always read from here.

pca9685:
  i2c_address: 0x5f    # Adeept default (not the standard 0x40)
  frequency: 50        # PWM frequency in Hz

motors:
  rear:
    channel_in1: 15     # positive pole
    channel_in2: 14     # negative pole
    max_speed: 14
    accelerate_rate: 10          # units/second for forward acceleration
    reverse_accelerate_rate: 3   # units/second when starting from stop into reverse (slow creep)
    decelerate_rate: 200         # units/second for braking
    cm_per_speed_unit: 1.2  # cm/s per throttle unit — calibrate: run forward(6) for 1s, measure d_cm, set d_cm/6

servos:
  servo0:              # Front wheel steering (left / right)
    channel: 0         # TODO: verify correct PCA9685 channel from examples/03_servo.py
    center_angle: 94.68   # Straight ahead (calibrated)
    max_angle: 50      # Maximum right turn angle
    min_angle: 140     # Maximum left turn angle
    step_size: 5       # Angle change step size for smoother steering

  servo1:              # Head rotation left/right
    channel: 1
    center_angle: 89.85
    max_angle: 0       # Maximum right turn angle
    min_angle: 180     # Maximum left turn angle
    step_size: 5       # Angle change step size for smoother steering

  servo2:              # Head rotation up/down
    channel: 2
    center_angle: 85
    max_angle: 25
    min_angle: 120

debug_stream:
  enabled: true
  port: 8080
  fps: 10

websocket:
  host: "0.0.0.0"     # Listen on all interfaces so Mac can connect over WiFi
  port: 8765

webrtc:
  host: "0.0.0.0"
  port: 8766           # Signaling WS — WebRTC video negotiation only

cameras:
  front:
    index: 0              # Pi Camera V3 Wide Angle — CSI port 0
    main_width: 1920
    main_height: 1080
    lores_width: 640
    lores_height: 480
    framerate: 30.0
  back:
    index: 1              # Back camera — CSI port 1
    main_width: 640
    main_height: 480
    lores_width: 320
    lores_height: 240
    framerate: 30.0
    rotate_180: true      # Mounted upside down

ultrasonic:
  trigger_pin: 23
  echo_pin: 24
  max_distance: 2   # Maximum distance to measure in m (adjust based on sensor specs)
  stop_cm: 30       # Distance at which to stop
  turn_cm: 90       # Distance at which to start slowing down
  sudden_stop_cm: 20  # Distance at which to hard-stop immediately (must be < stop_cm)

obstacle_avoidance:
  robot_width_cm: 20          # Measure actual chassis width and update
  clearance_buffer_cm: 10     # Minimum extra clearance required on each side to attempt passing
  focal_length_px: 259        # Geometric estimate: (lores_width/2) / tan(hfov_rad/2) = 320/tan(51°).
                               # Calibrate empirically: place a 30 cm object at 50 cm, measure pixel
                               # width W in the lores frame, then set to (W * 50) / 30.
  camera_hfov_deg: 102        # Pi Camera Module 3 Wide — horizontal FOV (not diagonal)